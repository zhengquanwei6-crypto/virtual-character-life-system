name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Web URL loaded by the APK"
        required: true
        default: "http://96.30.199.85:8090/index.html"
      version_name:
        description: "Version name"
        required: true
        default: "0.3.0"
      version_code:
        description: "Version code"
        required: true
        default: "4"
  push:
    tags:
      - "v*"

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Download Gradle
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
      - name: Build debug APK
        run: |
          /tmp/gradle-8.10.2/bin/gradle app:assembleDebug \
            -PWEB_URL="${{ github.event.inputs.web_url || 'http://96.30.199.85:8090/index.html' }}" \
            -PAPP_VERSION_NAME="${{ github.event.inputs.version_name || github.ref_name }}" \
            -PAPP_VERSION_CODE="${{ github.event.inputs.version_code || github.run_number }}"
      - uses: actions/upload-artifact@v4
        with:
          name: virtual-character-life-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
